version: 2
project_name: temren
before:
  hooks:
    - go mod tidy

builds:
  - id: temren
    main: ./cmd/temren
    binary: temren
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/temren/cmd/temren/cmd.Version={{ .Version }}
      - -X github.com/temren/cmd/temren/cmd.Build={{ .ShortCommit }}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
    - title: Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "Merge pull request"

release:
  github:
    owner: nickzsche
    name: temren
